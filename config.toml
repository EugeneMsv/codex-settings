model_reasoning_effort = "high"
show_raw_agent_reasoning = true
model_reasoning_summary = "detailed"
plan_mode_reasoning_effort = "xhigh"

personality = "pragmatic"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
web_search = "cached"
commit_attribution = ""

[features]
multi_agent = true
personality = true
codex_hooks = true
runtime_metrics = true

[tui]
animations = false
theme = "dracula"
status_line = [ "current-dir", "git-branch", "context-usage", "context-window-size", "five-hour-limit", "weekly-limit",
    "model-with-reasoning", "codex-version" ]

[shell_environment_policy]
inherit = "core"


[agents]
max_threads = 6
max_depth = 1

[agents.developer]
config_file = "agents/developer.toml"
description = "Feature implementation agent for approved plans or concise implementation planning."

[agents.deployer]
config_file = "agents/deployer.toml"
description = "Deployment update agent for service version and environment configuration changes."

[projects."/Users/Eugene_Moiseev"]
trust_level = "trusted"

[projects."/Users/Eugene_Moiseev/.codex"]
trust_level = "trusted"

[otel]
environment = "dev"
log_user_prompt = false
exporter = { otlp-grpc = { endpoint = "http://localhost:4317" } }
trace_exporter = { otlp-grpc = { endpoint = "http://localhost:4317" } }
metrics_exporter = { otlp-grpc = { endpoint = "http://localhost:4317" } }

[analytics]
enabled = false

[mcp_servers.sequential_thinking]
command = "docker"
args = ["run", "-i", "--rm", "mcp/sequentialthinking"]

[mcp_servers.sequential_thinking.tools.sequentialthinking]
approval_mode = "approve"

[mcp_servers.context7]
command = "docker"
args = ["run", "-i", "--rm", "-e", "MCP_TRANSPORT=stdio", "mcp/context7"]

[plugins."github@openai-curated"]
enabled = true
